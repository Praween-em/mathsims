<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trig Ratios of 0° and 90° — Limiting Cases</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#050510;--panel:rgba(5,5,20,.9);--border:rgba(0,240,255,.3);--hyp:#00f0ff;--opp:#ff00ff;--adj:#ffaa00;--ang:#00ff88;--text:#dde4ff}
    body{background:var(--bg);font-family:'Segoe UI',sans-serif;overflow:hidden;color:var(--text);touch-action:none}
    canvas{display:block;position:absolute;top:0;left:0}
    #badge{position:absolute;top:15px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:6px 18px;font-size:clamp(.7rem,2.5vw,.95rem);letter-spacing:1.5px;color:#00f0ff;text-shadow:0 0 8px rgba(0,240,255,.5);backdrop-filter:blur(10px);pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,240,255,.15);z-index:10}
    #ui{position:absolute;right:22px;top:50%;transform:translateY(-50%);background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:22px 16px;backdrop-filter:blur(14px);box-shadow:0 0 25px rgba(0,240,255,.15);min-width:195px;display:flex;flex-direction:column;gap:12px;align-items:center;z-index:10}
    #ui h2{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:#00f0ff;text-align:center}
    #angDisp{font-size:2rem;font-weight:800;color:#00ff88;text-shadow:0 0 16px rgba(0,255,136,.6);letter-spacing:2px;text-align:center}
    .slider-wrap{height:200px;display:flex;align-items:center;justify-content:center;width:28px}
    .vslider{-webkit-appearance:none;width:180px;height:6px;border-radius:3px;background:#151530;border:1px solid rgba(0,240,255,.2);outline:none;transform:rotate(-90deg);cursor:pointer}
    .vslider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#00ff88;box-shadow:0 0 10px #00ff88cc;cursor:pointer;border:2px solid #fff}
    .div{width:100%;height:1px;background:var(--border)}
    .rrow{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);width:100%}
    .rname{font-size:.76rem;min-width:60px}
    .rval{font-size:.88rem;font-weight:700;min-width:62px;text-align:right}
    .undef{color:#ff4444!important;font-size:.74rem!important;animation:flash .8s infinite}
    @keyframes flash{0%,100%{opacity:1}50%{opacity:.3}}
    .snap-row{display:flex;gap:8px;width:100%}
    .snap-btn{flex:1;padding:9px 0;border-radius:9px;border:1px solid rgba(0,240,255,.3);background:rgba(0,240,255,.07);color:var(--text);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
    .snap-btn:hover{background:rgba(0,240,255,.2);border-color:#00f0ff}
    #hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:clamp(.6rem,1.8vw,.75rem);color:#556688;pointer-events:none;background:rgba(5,5,15,.6);padding:4px 12px;border-radius:8px;z-index:10}
  </style>
</head>
<body>
  <div id="badge">Trigonometric Ratios of 0° and 90° — Limiting Cases</div>
  <canvas id="c"></canvas>
  <div id="ui">
    <h2>Angle (A)</h2>
    <div id="angDisp">45°</div>
    <div class="slider-wrap">
      <input type="range" class="vslider" id="slider" min="0" max="90" value="45" step="0.5">
    </div>
    <div class="snap-row">
      <button class="snap-btn" onclick="snapTo(0)">→ 0°</button>
      <button class="snap-btn" onclick="snapTo(90)">→ 90°</button>
    </div>
    <div class="div"></div>
    <div class="rrow"><span class="rname" style="color:#ff00ff">sin A</span><span class="rval" id="vsin" style="color:#ff00ff">0.707</span></div>
    <div class="rrow"><span class="rname" style="color:#00f0ff">cos A</span><span class="rval" id="vcos" style="color:#00f0ff">0.707</span></div>
    <div class="rrow"><span class="rname" style="color:#ffaa00">tan A</span><span class="rval" id="vtan" style="color:#ffaa00">1.000</span></div>
    <div class="rrow"><span class="rname" style="color:#ff88cc">cosec A</span><span class="rval" id="vcsc" style="color:#ff88cc">1.414</span></div>
    <div class="rrow"><span class="rname" style="color:#88ddff">sec A</span><span class="rval" id="vsec" style="color:#88ddff">1.414</span></div>
    <div class="rrow"><span class="rname" style="color:#ffcc55">cot A</span><span class="rval" id="vcot" style="color:#ffcc55">1.000</span></div>
  </div>
  <div id="hint">Slide toward 0° or 90° to see limiting values — watch for "Not Defined"</div>

  <script>
    const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
    let W,H; function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
    resize(); window.addEventListener('resize',resize);

    const slider=document.getElementById('slider');
    let ang=45;
    slider.addEventListener('input',()=>{ang=Number(slider.value)});

    function snapTo(a){ang=a;slider.value=a}

    function fmt(v,name){
      if(name==='csc'&&ang<0.1) return '∞';
      if(name==='tan'&&ang>89.9) return '∞';
      if(name==='cot'&&ang<0.1) return '∞';
      if(name==='sec'&&ang>89.9) return '∞';
      if(!isFinite(v)||Math.abs(v)>9999) return '∞';
      return v.toFixed(4);
    }

    function isUndef(name){
      if(name==='csc'&&ang<0.1) return true;
      if(name==='tan'&&ang>89.9) return true;
      if(name==='cot'&&ang<0.1) return true;
      if(name==='sec'&&ang>89.9) return true;
      return false;
    }

    function rrect(x,y,w,h,r){
      ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
      ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
      ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
    }

    function draw(){
      ctx.clearRect(0,0,W,H);

      const rad=ang*Math.PI/180;
      const r=Math.min(W*0.26,210);
      const cx=W*0.38, cy=H*0.55;

      const sinA=Math.sin(rad), cosA=Math.cos(rad);
      const tanA=Math.tan(rad), cscA=1/sinA, secA=1/cosA, cotA=cosA/sinA;

      // Origin A
      const A={x:cx,y:cy};
      // Ray endpoint C (on circle of radius r)
      const C={x:cx+r*cosA, y:cy-r*sinA};
      // B = foot of perpendicular from C to horizontal
      const B={x:C.x, y:cy};

      // Draw horizontal ray (base line)
      ctx.beginPath();ctx.moveTo(cx-20,cy);ctx.lineTo(cx+r+30,cy);
      ctx.strokeStyle='rgba(120,130,180,.35)';ctx.lineWidth=1.5;ctx.stroke();

      // Draw faint circle (arc to show constant hypotenuse)
      ctx.beginPath();ctx.arc(cx,cy,r,0,-Math.PI/2,true);
      ctx.strokeStyle='rgba(0,240,255,.15)';ctx.lineWidth=1;ctx.setLineDash([4,6]);ctx.stroke();ctx.setLineDash([]);

      // Triangle fill
      ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.lineTo(C.x,C.y);ctx.closePath();
      ctx.fillStyle='rgba(0,240,255,.06)';ctx.fill();

      // Hypotenuse AC (cyan)
      ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(C.x,C.y);
      ctx.strokeStyle='#00f0ff';ctx.lineWidth=4.5;ctx.shadowColor='#00f0ff';ctx.shadowBlur=12;ctx.stroke();ctx.shadowBlur=0;

      // Opposite BC (magenta) — vertical leg
      if(ang>0.5){
        ctx.beginPath();ctx.moveTo(B.x,B.y);ctx.lineTo(C.x,C.y);
        ctx.strokeStyle='#ff00ff';ctx.lineWidth=4;ctx.shadowColor='#ff00ff';ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;
      }

      // Adjacent AB (amber) — horizontal leg
      if(ang<89.5){
        ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);
        ctx.strokeStyle='#ffaa00';ctx.lineWidth=4;ctx.shadowColor='#ffaa00';ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;
      }

      // Right angle at B
      if(ang>2&&ang<88){
        const sq=12;
        ctx.beginPath();ctx.moveTo(B.x-sq,B.y);ctx.lineTo(B.x-sq,B.y-sq);ctx.lineTo(B.x,B.y-sq);
        ctx.strokeStyle='rgba(200,210,255,.45)';ctx.lineWidth=1.5;ctx.stroke();
      }

      // Angle arc at A
      ctx.beginPath();ctx.arc(A.x,A.y,40,-rad,0);
      ctx.strokeStyle='#00ff88';ctx.lineWidth=2.5;ctx.shadowColor='#00ff88';ctx.shadowBlur=7;ctx.stroke();ctx.shadowBlur=0;
      const midA=-rad/2;
      ctx.font='bold 15px Segoe UI';ctx.fillStyle='#00ff88';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(`${ang.toFixed(1)}°`,A.x+Math.cos(midA)*58,A.y+Math.sin(midA)*58);

      // Vertex labels
      [[A,'A',-16,12],[B,'B',14,16],[C,'C',16,-16]].forEach(([p,l,dx,dy])=>{
        ctx.font='bold 16px Segoe UI';ctx.fillStyle='rgba(5,5,20,.8)';ctx.fillRect(p.x+dx-9,p.y+dy-9,18,18);
        ctx.fillStyle='#dde4ff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(l,p.x+dx,p.y+dy);
      });

      // Side measure labels
      function midLbl(p1,p2,t,col,ox,oy){
        const mx=(p1.x+p2.x)/2+ox, my=(p1.y+p2.y)/2+oy;
        ctx.font='bold 12px Segoe UI';const tw=ctx.measureText(t).width;
        ctx.fillStyle='rgba(5,5,20,.8)';rrect(mx-tw/2-5,my-9,tw+10,18,4);ctx.fill();
        ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,mx,my);
      }
      midLbl(A,C,'r (hyp)','#00f0ff',-20,0);
      if(ang>2)  midLbl(B,C,'BC = r·sinA','#ff00ff',26,0);
      if(ang<88) midLbl(A,B,'AB = r·cosA','#ffaa00',0,18);

      // Limiting case callouts
      let msg='';
      if(ang<2)  msg='As A → 0°:  BC → 0,  AB → r';
      if(ang>88) msg='As A → 90°: AB → 0,  BC → r';
      if(msg){
        ctx.font='bold 14px Segoe UI';const tw=ctx.measureText(msg).width;
        ctx.fillStyle='rgba(5,5,20,.9)';rrect(W*0.06-8,H*0.15-11,tw+20,24,6);ctx.fill();
        ctx.strokeStyle='rgba(0,255,136,.4)';ctx.lineWidth=1;rrect(W*0.06-8,H*0.15-11,tw+20,24,6);ctx.stroke();
        ctx.fillStyle='#00ff88';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(msg,W*0.06+2,H*0.15);
      }

      // Proof note box bottom-left
      const bX=28,bY=H-155,bW=430,bH=124;
      ctx.fillStyle='rgba(5,5,20,.88)';ctx.strokeStyle='rgba(0,240,255,.25)';ctx.lineWidth=1;
      rrect(bX,bY,bW,bH,12);ctx.fill();ctx.stroke();

      const notes=[
        {l:'When A = 0°:', v:'sin 0° = 0,  cos 0° = 1,  tan 0° = 0  |  cosec 0° = ∞ (not defined)'},
        {l:'When A = 90°:',v:'sin 90° = 1,  cos 90° = 0,  tan 90° = ∞ (not defined)  |  sec 90° = ∞'},
        {l:'Key insight:', v:'sin increases 0→1,  cos decreases 1→0  as angle goes 0° to 90°'},
      ];
      ctx.textAlign='left';ctx.textBaseline='middle';
      notes.forEach((n,i)=>{
        ctx.font='bold 13px Segoe UI';ctx.fillStyle='#00ff88';ctx.fillText(n.l,bX+12,bY+20+i*34);
        ctx.font='13px Segoe UI';ctx.fillStyle='#ccd4ee';ctx.fillText(n.v,bX+12+ctx.measureText(n.l).width+8,bY+20+i*34);
      });

      // Update panel
      document.getElementById('angDisp').textContent=`${ang.toFixed(1)}°`;

      const vals=[
        {id:'vsin',v:sinA,n:'sin'},
        {id:'vcos',v:cosA,n:'cos'},
        {id:'vtan',v:tanA,n:'tan'},
        {id:'vcsc',v:cscA,n:'csc'},
        {id:'vsec',v:secA,n:'sec'},
        {id:'vcot',v:cotA,n:'cot'},
      ];
      vals.forEach(({id,v,n})=>{
        const el=document.getElementById(id);
        const undef=isUndef(n);
        el.textContent=undef?'Not Defined':fmt(v,n);
        el.className='rval'+(undef?' undef':'');
      });
    }

    function animate(){requestAnimationFrame(animate);draw()}
    animate();
  </script>
</body>
</html>
